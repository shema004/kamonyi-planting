<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Kamonyi Planting System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🌱</div>
      <h1 class="text-xl font-bold text-gray-800">Admin Login</h1>
      <p class="text-xs text-gray-400 mt-1">Kamonyi Planting System</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Email</label>
        <input type="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
          placeholder="admin@kamonyi.gov.rw">
      </div>
      <div class="mb-6">
        <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition text-sm">
        Login to Admin Panel
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="/" class="text-xs text-gray-400 hover:text-green-600">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
